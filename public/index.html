<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sakiko Admin · 本地控制台</title>
<style>
  :root {
    --bg: #eef5f9;
    --panel: #ffffff;
    --panel-2: #f2f8fb;
    --border: #dae7ee;
    --text: #1c2b36;
    --text-dim: #6b7d8f;
    --accent: #55c0e0;
    --accent-dim: #2f96b8;
    --accent-rgb: 85, 192, 224;
    --log-user: #56708a;
    --danger: #d43a58;
    --danger-rgb: 212, 58, 88;
    --danger-bg: rgba(212, 58, 88, 0.08);
    --ok: #22b573;
    --ok-rgb: 34, 181, 115;
    --shadow: 0 1px 2px rgba(28, 43, 54, 0.04), 0 8px 24px rgba(28, 43, 54, 0.05);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans GB",
      "PingFang SC", "Microsoft YaHei", sans-serif;
    overflow: hidden;
  }

  #app {
    display: flex;
    height: 100vh;
  }

  /* ---------- Sidebar ---------- */
  aside {
    width: 260px;
    flex-shrink: 0;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }

  .brand-mark {
    width: 34px;
    height: 34px;
    border-radius: 9px;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 15px;
    color: #fff;
    flex-shrink: 0;
  }

  .brand-title {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
  }
  .brand-sub {
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  .side-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }

  .side-label {
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 8px;
  }

  .status-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 600;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    flex-shrink: 0;
  }
  .dot.on {
    background: var(--ok);
    box-shadow: 0 0 0 3px rgba(var(--ok-rgb), 0.15);
  }
  .dot.off {
    background: var(--danger);
    box-shadow: 0 0 0 3px rgba(var(--danger-rgb), 0.15);
  }

  .stat-value {
    font-size: 28px;
    font-weight: 700;
    line-height: 1.1;
  }
  .stat-value.danger { color: var(--danger); }

  .meltdown-list {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-height: 160px;
    overflow-y: auto;
  }
  .meltdown-item {
    background: var(--danger-bg);
    border: 1px solid rgba(var(--danger-rgb), 0.25);
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    color: var(--danger);
    font-weight: 600;
  }
  .meltdown-empty {
    font-size: 12px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .sidebar-footer {
    margin-top: auto;
    font-size: 11px;
    color: var(--text-dim);
    line-height: 1.6;
  }

  /* ---------- Main ---------- */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    padding: 24px 28px;
    gap: 18px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: var(--shadow);
  }

  .panel-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .panel-title {
    font-size: 14px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title .tag {
    font-size: 10px;
    font-weight: 600;
    color: var(--accent-dim);
    background: rgba(var(--accent-rgb), 0.14);
    border: 1px solid rgba(var(--accent-rgb), 0.35);
    border-radius: 6px;
    padding: 2px 7px;
    letter-spacing: 0.05em;
  }

  .monitor {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.7;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .log-line {
    display: flex;
    gap: 8px;
    animation: fadein 0.2s ease;
  }
  @keyframes fadein {
    from { opacity: 0; transform: translateY(2px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .log-time {
    color: var(--text-dim);
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  .log-arrow-user { color: var(--log-user); font-weight: 600; }
  .log-arrow-bot { color: var(--accent-dim); font-weight: 600; }
  .log-text { color: var(--text); word-break: break-word; }

  .log-line.meltdown {
    background: var(--danger-bg);
    border-radius: 8px;
    padding: 6px 10px;
    color: var(--danger);
    font-weight: 600;
  }

  .log-empty {
    color: var(--text-dim);
    font-size: 13px;
    padding: 40px 0;
    text-align: center;
  }

  /* ---------- Control panel ---------- */
  .control {
    padding: 18px 20px;
  }
  .control-row {
    display: flex;
    gap: 10px;
  }
  input#targetId {
    flex: 1;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  input#targetId:focus {
    border-color: var(--accent);
  }
  input#targetId::placeholder { color: var(--text-dim); }

  button#forceChatBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    border: none;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    padding: 0 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  button#forceChatBtn:hover { filter: brightness(1.08); }
  button#forceChatBtn:active { transform: scale(0.97); }
  button#forceChatBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  #controlFeedback {
    margin-top: 10px;
    font-size: 12px;
    min-height: 16px;
    color: var(--text-dim);
  }
  #controlFeedback.ok { color: var(--ok); }
  #controlFeedback.err { color: var(--danger); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(var(--accent-rgb), 0.35); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(var(--accent-rgb), 0.55); }

  /* ---------- 单线窃听（侧边栏搜索区） ---------- */
  .side-input {
    width: 100%;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    margin-bottom: 8px;
    transition: border-color 0.15s;
  }
  .side-input:focus { border-color: var(--accent); }
  .side-input::placeholder { color: var(--text-dim); }

  .side-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent-dim);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 0;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .side-btn:hover { background: rgba(var(--accent-rgb), 0.1); }
  .side-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- 私密聊天记录 Modal ---------- */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(28, 43, 54, 0.35);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-backdrop.hidden { display: none; }

  .modal {
    width: 540px;
    max-width: 92vw;
    max-height: 80vh;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: 0 24px 64px rgba(28, 43, 54, 0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .modal-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .modal-close {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 18px;
    line-height: 1;
    padding: 4px 10px;
    border-radius: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .modal-close:hover { background: var(--panel-2); color: var(--text); }

  .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .modal-empty {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 48px 0;
  }

  .bubble-row { display: flex; }
  .bubble-row.user { justify-content: flex-start; }
  .bubble-row.assistant { justify-content: flex-end; }

  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 15px;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .bubble.user {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .bubble.assistant {
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    color: #fff;
    border-bottom-right-radius: 4px;
  }
</style>
</head>
<body>
<div id="app">
  <aside>
    <div class="brand">
      <div class="brand-mark">祥</div>
      <div>
        <div class="brand-title">Sakiko Admin</div>
        <div class="brand-sub">Ave Mujica · Local Console</div>
      </div>
    </div>

    <div class="side-card">
      <div class="side-label">Connection</div>
      <div class="status-row">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">Connecting…</span>
      </div>
    </div>

    <div class="side-card">
      <div class="side-label">已交互用户总数</div>
      <div class="stat-value" id="knownUserCount">–</div>
    </div>

    <div class="side-card">
      <div class="side-label">破防 / 红温警报</div>
      <div class="stat-value danger" id="meltdownCount">–</div>
      <div class="meltdown-list" id="meltdownList"></div>
    </div>

    <div class="side-card">
      <div class="side-label">单线窃听</div>
      <input id="wiretapId" class="side-input" type="text" placeholder="输入 QQ 号…" />
      <button id="wiretapBtn" class="side-btn">查询聊天记录</button>
    </div>

    <div class="sidebar-footer">
      仅监听 127.0.0.1，本机私人控制台<br />
      不对外网开放
    </div>
  </aside>

  <main>
    <section class="panel monitor" style="flex: 1 1 60%;">
      <div class="panel-header">
        <div class="panel-title">上帝视角监控 <span class="tag">LIVE</span></div>
      </div>
      <div id="log"><div class="log-empty">等待消息中…</div></div>
    </section>

    <section class="panel" style="flex: 0 0 auto;">
      <div class="panel-header">
        <div class="panel-title">主控台</div>
      </div>
      <div class="control">
        <div class="control-row">
          <input id="targetId" type="text" placeholder="输入目标 QQ 号…" />
          <button id="forceChatBtn">强制搭话</button>
        </div>
        <div id="controlFeedback"></div>
      </div>
    </section>
  </main>
</div>

<div class="modal-backdrop hidden" id="modalBackdrop">
  <div class="modal">
    <div class="modal-header">
      <div class="panel-title" id="modalTitle">私密聊天记录</div>
      <button class="modal-close" id="modalClose">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  const logEl = document.getElementById('log');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const knownUserCountEl = document.getElementById('knownUserCount');
  const meltdownCountEl = document.getElementById('meltdownCount');
  const meltdownListEl = document.getElementById('meltdownList');

  function pad(n) { return String(n).padStart(2, '0'); }
  function fmtTime(ts) {
    const d = new Date(ts);
    return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
  function fmtRemaining(ms) {
    const s = Math.max(0, Math.ceil(ms / 1000));
    const m = Math.floor(s / 60);
    const r = s % 60;
    return m > 0 ? `${m}分${r}秒` : `${r}秒`;
  }

  function appendLog(node) {
    const emptyHint = logEl.querySelector('.log-empty');
    if (emptyHint) emptyHint.remove();

    const atBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 40;
    logEl.appendChild(node);
    if (atBottom) logEl.scrollTop = logEl.scrollHeight;

    // 避免日志无限增长，只保留最近 500 条
    while (logEl.children.length > 500) {
      logEl.removeChild(logEl.firstChild);
    }
  }

  function renderEvent(evt) {
    const line = document.createElement('div');

    if (evt.type === 'user_message') {
      line.className = 'log-line';
      line.innerHTML =
        `<span class="log-time">[${fmtTime(evt.time)}]</span>` +
        `<span class="log-arrow-user">用户(${escapeHtml(evt.userId)}) -> 祥子:</span>` +
        `<span class="log-text">${escapeHtml(evt.text)}</span>`;
    } else if (evt.type === 'bot_message') {
      line.className = 'log-line';
      line.innerHTML =
        `<span class="log-time">[${fmtTime(evt.time)}]</span>` +
        `<span class="log-arrow-bot">祥子 -> 用户(${escapeHtml(evt.userId)}):</span>` +
        `<span class="log-text">${escapeHtml(evt.text)}</span>`;
    } else if (evt.type === 'meltdown') {
      line.className = 'log-line meltdown';
      const seconds = Math.round(evt.muteMs / 1000);
      line.innerHTML =
        `⚠ [${fmtTime(evt.time)}] 用户(${escapeHtml(evt.userId)}) 触发雷点，进入破防冷静期（${seconds}秒）`;
      refreshStats();
    } else {
      return;
    }

    appendLog(line);
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
  }

  function connectStream() {
    const es = new EventSource('/api/stream');

    es.onopen = () => {
      statusDot.className = 'dot on';
      statusText.textContent = 'Online';
    };

    es.onerror = () => {
      statusDot.className = 'dot off';
      statusText.textContent = 'Reconnecting…';
    };

    es.onmessage = (e) => {
      try {
        renderEvent(JSON.parse(e.data));
      } catch (err) {
        console.error('解析事件失败', err);
      }
    };
  }

  async function refreshStats() {
    try {
      const res = await fetch('/api/stats');
      const data = await res.json();

      knownUserCountEl.textContent = data.knownUserCount ?? 0;
      meltdownCountEl.textContent = (data.meltdownUsers || []).length;

      meltdownListEl.innerHTML = '';
      if (!data.meltdownUsers || data.meltdownUsers.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'meltdown-empty';
        empty.textContent = '当前无人破防';
        meltdownListEl.appendChild(empty);
        return;
      }

      for (const u of data.meltdownUsers) {
        const item = document.createElement('div');
        item.className = 'meltdown-item';
        item.innerHTML = `<span>${escapeHtml(u.userId)}</span><span>${fmtRemaining(u.remainingMs)}</span>`;
        meltdownListEl.appendChild(item);
      }
    } catch (err) {
      console.error('拉取状态失败', err);
    }
  }

  const forceChatBtn = document.getElementById('forceChatBtn');
  const targetIdInput = document.getElementById('targetId');
  const feedbackEl = document.getElementById('controlFeedback');

  async function forceChat() {
    const targetId = targetIdInput.value.trim();
    if (!targetId) {
      feedbackEl.textContent = '请先输入 QQ 号 desuwa';
      feedbackEl.className = 'err';
      return;
    }

    forceChatBtn.disabled = true;
    feedbackEl.textContent = '正在下达指令…';
    feedbackEl.className = '';

    try {
      const res = await fetch('/api/force-chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ targetId }),
      });
      const data = await res.json();
      if (res.ok) {
        feedbackEl.textContent = `已强制触发对 ${targetId} 的主动搭话`;
        feedbackEl.className = 'ok';
      } else {
        feedbackEl.textContent = data.error || '触发失败';
        feedbackEl.className = 'err';
      }
    } catch (err) {
      feedbackEl.textContent = '请求失败：' + err.message;
      feedbackEl.className = 'err';
    } finally {
      forceChatBtn.disabled = false;
    }
  }

  forceChatBtn.addEventListener('click', forceChat);
  targetIdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') forceChat();
  });

  // ---------- 单线窃听：查询指定 QQ 号的完整聊天记录，用聊天气泡渲染在 Modal 里 ----------
  const wiretapBtn = document.getElementById('wiretapBtn');
  const wiretapIdInput = document.getElementById('wiretapId');
  const modalBackdrop = document.getElementById('modalBackdrop');
  const modalTitle = document.getElementById('modalTitle');
  const modalClose = document.getElementById('modalClose');
  const modalBody = document.getElementById('modalBody');

  function openModal() { modalBackdrop.classList.remove('hidden'); }
  function closeModal() { modalBackdrop.classList.add('hidden'); }

  modalClose.addEventListener('click', closeModal);
  modalBackdrop.addEventListener('click', (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && !modalBackdrop.classList.contains('hidden')) closeModal();
  });

  function renderHistory(history) {
    modalBody.innerHTML = '';

    if (!Array.isArray(history) || history.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'modal-empty';
      empty.textContent = '没有找到聊天记录';
      modalBody.appendChild(empty);
      return;
    }

    for (const msg of history) {
      const isBot = msg.role === 'assistant';
      const row = document.createElement('div');
      row.className = `bubble-row ${isBot ? 'assistant' : 'user'}`;

      const bubble = document.createElement('div');
      bubble.className = `bubble ${isBot ? 'assistant' : 'user'}`;
      bubble.textContent = msg.content; // textContent 天然转义，不需要手动 escape

      row.appendChild(bubble);
      modalBody.appendChild(row);
    }

    modalBody.scrollTop = modalBody.scrollHeight;
  }

  async function queryWiretap() {
    const userId = wiretapIdInput.value.trim();
    if (!userId) return;

    modalTitle.textContent = `私密聊天记录 · ${userId}`;
    modalBody.innerHTML = '<div class="modal-empty">加载中…</div>';
    openModal();

    wiretapBtn.disabled = true;
    try {
      const res = await fetch(`/api/history/${encodeURIComponent(userId)}`);
      const history = await res.json();
      renderHistory(history);
    } catch (err) {
      modalBody.innerHTML = `<div class="modal-empty">查询失败：${escapeHtml(err.message)}</div>`;
    } finally {
      wiretapBtn.disabled = false;
    }
  }

  wiretapBtn.addEventListener('click', queryWiretap);
  wiretapIdInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') queryWiretap();
  });

  connectStream();
  refreshStats();
  setInterval(refreshStats, 5000);
</script>
</body>
</html>
